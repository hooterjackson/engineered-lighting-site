name: publish site

on:
  push:
    branches: [main]
  workflow_dispatch:

# Fresh personal-account repos get a read-only GITHUB_TOKEN by default;
# gh-deploy needs to push the gh-pages branch.
permissions:
  contents: write

# Overlapping runs would race force-pushes to gh-pages; newest push wins.
concurrency:
  group: publish-site
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-site.txt
            requirements-test.txt
      - name: System libraries for social cards
        run: sudo apt-get update -q && sudo apt-get install -y -q --no-install-recommends libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev
      - run: pip install -r requirements-site.txt -r requirements-test.txt
      - name: Add-a-doc acceptance test
        run: |
          printf '# Doc 99 · Test chapter\n\nAuto-nav check.\n' > docs/99-test.md
          mkdocs build -q
          grep -q "99-test" site/index.html
          rm docs/99-test.md
      - run: mkdocs build --strict
      - run: playwright install --with-deps chromium
      - run: pytest tests/e2e -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: site-screenshots
          path: test-artifacts/screens/
          if-no-files-found: ignore

  cad:
    # frame.scad must render headless; macOS can't run OpenSCAD in the dev
    # sandbox, so Linux CI is the render check of record. Non-gating.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -q && sudo apt-get install -y -q --no-install-recommends openscad
      - name: Render all frame parts
        run: |
          for p in coupon pan_base yoke head_shell all; do
            openscad -o "/tmp/$p.stl" -D "part=\"$p\"" docs/cad/frame.scad
            test -s "/tmp/$p.stl"
          done

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure git identity for gh-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-site.txt
      - name: System libraries for social cards
        run: sudo apt-get update -q && sudo apt-get install -y -q --no-install-recommends libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev
      - run: pip install -r requirements-site.txt
      - run: mkdocs build --strict
      - run: mkdocs gh-deploy --force
