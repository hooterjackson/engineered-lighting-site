name: publish site

on:
  push:
    branches: [main]
  workflow_dispatch:

# Fresh personal-account repos get a read-only GITHUB_TOKEN by default;
# gh-deploy needs to push the gh-pages branch.
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure git identity for gh-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-site.txt
      - run: pip install -r requirements-site.txt
      - run: mkdocs build --strict
      - run: mkdocs gh-deploy --force
