site_name: Engineered Lighting · Engineering Notebook
site_description: Prototype series for the Engineered Lighting robotic spotlight — research, bench builds, perception stack, and software.
site_url: https://engineering.engineered.lighting/

theme:
  name: material
  logo: assets/el-logo.svg
  favicon: assets/el-favicon.svg
  # One hosted family (IBM Plex Sans 400/600, imported in extra.css);
  # code uses the system mono stack. font:false stops Material loading Roboto.
  font: false
  palette:
    # Dark is the only screen scheme — light lives in the print stylesheet.
    # Built on slate so Material's derived colors stay sane; every visible
    # color is overridden in stylesheets/extra.css (tokens at the top).
    - scheme: slate
      primary: custom
      accent: custom
  features:
    - navigation.footer
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

# The PNG fallbacks stay in the repo but out of the built site (SVGs are used).
exclude_docs: |
  assets/wiring-*.png

plugins:
  - search
  - awesome-pages
  # Social cards need system Cairo; generated in CI only (CI=true on Actions),
  # so local builds stay dependency-light and fast.
  - social:
      enabled: !ENV [CI, false]
      cards_layout_options:
        background_color: "#000000"
        color: "#F2EEE6"
        font_family: IBM Plex Sans

markdown_extensions:
  - sane_lists
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - js/checklist.js

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
