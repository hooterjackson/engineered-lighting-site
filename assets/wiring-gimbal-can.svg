<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="720" fill="#ffffff"/>
  <text x="30" y="36" font-size="20" font-weight="bold" fill="#111">Doc 3 · Gimbal CAN wiring (stages 3–6)</text>
  <text x="30" y="56" font-size="12" fill="#555">Stage 3 wires Motor A only; stage 6 adds Motor B on the same bus. Signals ride the breadboard — motor power never does.</text>

  <!-- Legend -->
  <g font-size="11" fill="#333">
    <rect x="700" y="18" width="270" height="86" fill="#fbfbfb" stroke="#ccc" rx="6"/>
    <line x1="712" y1="34" x2="742" y2="34" stroke="#d62828" stroke-width="3"/><text x="748" y="38">+12 V motor power</text>
    <line x1="712" y1="50" x2="742" y2="50" stroke="#222" stroke-width="3"/><text x="748" y="54">GND (one!)</text>
    <line x1="712" y1="66" x2="742" y2="66" stroke="#7b2d8b" stroke-width="3"/><text x="748" y="70">3.3 V logic</text>
    <line x1="852" y1="34" x2="882" y2="34" stroke="#1d6fd6" stroke-width="3"/><text x="888" y="38">TX</text>
    <line x1="852" y1="50" x2="882" y2="50" stroke="#0f8a3d" stroke-width="3"/><text x="888" y="54">RX</text>
    <line x1="852" y1="66" x2="882" y2="66" stroke="#e8871e" stroke-width="3"/><text x="888" y="70">CAN H</text>
    <line x1="852" y1="82" x2="882" y2="82" stroke="#b8860b" stroke-width="3"/><text x="888" y="86">CAN L</text>
  </g>

  <!-- ESP32 box -->
  <rect x="60" y="90" width="200" height="180" fill="#eef3fb" stroke="#334" stroke-width="1.5" rx="8"/>
  <text x="160" y="114" font-size="14" font-weight="bold" text-anchor="middle" fill="#223">ESP32-C6 DevKitC</text>
  <text x="160" y="130" font-size="10" text-anchor="middle" fill="#556">USB-C to computer (flash + serial)</text>
  <g font-size="11" fill="#223" text-anchor="end">
    <text x="252" y="154">3V3</text>
    <text x="252" y="184">GND</text>
    <text x="252" y="214">GPIO6</text>
    <text x="252" y="244">GPIO7</text>
  </g>

  <!-- Transceiver box -->
  <rect x="400" y="90" width="190" height="200" fill="#eefaf1" stroke="#334" stroke-width="1.5" rx="8"/>
  <text x="495" y="114" font-size="13" font-weight="bold" text-anchor="middle" fill="#223">SN65HVD230</text>
  <text x="495" y="129" font-size="10" text-anchor="middle" fill="#556">CAN transceiver breakout</text>
  <g font-size="11" fill="#223">
    <text x="408" y="154">3V3</text>
    <text x="408" y="184">GND</text>
    <text x="408" y="214">CTX</text>
    <text x="408" y="244">CRX</text>
    <text x="548" y="164" >CANH</text>
    <text x="548" y="194">CANL</text>
  </g>

  <!-- Signal wires ESP32 -> transceiver -->
  <line x1="260" y1="150" x2="400" y2="150" stroke="#7b2d8b" stroke-width="3"/>
  <line x1="260" y1="180" x2="400" y2="180" stroke="#222" stroke-width="3"/>
  <line x1="260" y1="210" x2="400" y2="210" stroke="#1d6fd6" stroke-width="3"/><text x="330" y="204" font-size="10" fill="#1d6fd6" text-anchor="middle">GPIO6 → CTX</text>
  <line x1="260" y1="240" x2="400" y2="240" stroke="#0f8a3d" stroke-width="3"/><text x="330" y="256" font-size="10" fill="#0f8a3d" text-anchor="middle">GPIO7 ← CRX</text>

  <!-- PSU -->
  <rect x="60" y="470" width="190" height="160" fill="#fdf1ee" stroke="#a33" stroke-width="1.5" rx="8"/>
  <text x="155" y="495" font-size="13" font-weight="bold" text-anchor="middle" fill="#622">Bench supply</text>
  <text x="155" y="512" font-size="11" text-anchor="middle" fill="#844">12.0 V · current limit 2.0 A</text>
  <text x="155" y="527" font-size="10" text-anchor="middle" fill="#966">(→ ~3 A for two-motor moves)</text>
  <g font-size="12" font-weight="bold">
    <text x="238" y="564" fill="#d62828" text-anchor="end">+</text>
    <text x="238" y="604" fill="#222" text-anchor="end">−</text>
  </g>

  <!-- Motor A -->
  <rect x="420" y="440" width="250" height="110" fill="#f4f0fb" stroke="#334" stroke-width="1.5" rx="8"/>
  <text x="545" y="463" font-size="13" font-weight="bold" text-anchor="middle" fill="#223">RMD-L-5005 · Motor A</text>
  <text x="545" y="479" font-size="11" text-anchor="middle" fill="#556">PAN · CAN address 0x141 · clamp it!</text>
  <g font-size="11" fill="#223">
    <text x="428" y="504">VCC</text>
    <text x="428" y="534">GND</text>
    <text x="628" y="504">CANH</text>
    <text x="628" y="534">CANL</text>
  </g>

  <!-- Motor B -->
  <rect x="420" y="580" width="250" height="110" fill="#f4f0fb" stroke="#334" stroke-width="1.5" rx="8" stroke-dasharray="6 3"/>
  <text x="545" y="603" font-size="13" font-weight="bold" text-anchor="middle" fill="#223">RMD-L-5005 · Motor B</text>
  <text x="545" y="619" font-size="11" text-anchor="middle" fill="#556">TILT · re-addressed to 0x142 (stage 6)</text>
  <g font-size="11" fill="#223">
    <text x="428" y="644">VCC</text>
    <text x="428" y="674">GND</text>
    <text x="628" y="644">CANH</text>
    <text x="628" y="674">CANL</text>
  </g>

  <!-- Motor power from PSU (direct, not via breadboard) -->
  <path d="M 250 560 L 340 560 L 340 500 L 420 500" fill="none" stroke="#d62828" stroke-width="3.5"/>
  <path d="M 340 560 L 340 640 L 420 640" fill="none" stroke="#d62828" stroke-width="3.5"/>
  <path d="M 250 600 L 310 600 L 310 530 L 420 530" fill="none" stroke="#222" stroke-width="3.5"/>
  <path d="M 310 600 L 310 670 L 420 670" fill="none" stroke="#222" stroke-width="3.5"/>
  <text x="60" y="700" font-size="10" fill="#a33">Motor power runs direct to the PSU terminals —</text>
  <text x="60" y="714" font-size="10" fill="#a33">never through the breadboard (rails ~1 A).</text>

  <!-- Common ground tie: signal GND down to PSU minus -->
  <path d="M 330 180 L 330 330 L 310 330 L 310 600" fill="none" stroke="#222" stroke-width="2.5" stroke-dasharray="5 4"/>
  <text x="338" y="330" font-size="10" fill="#222">Rule 3: ONE common ground —</text>
  <text x="338" y="343" font-size="10" fill="#222">signal GND meets motor GND at the supply</text>

  <!-- CAN bus: transceiver right -> vertical bus -> motors -->
  <path d="M 590 160 L 760 160 L 760 500 L 670 500" fill="none" stroke="#e8871e" stroke-width="3"/>
  <path d="M 760 500 L 760 640 L 670 640" fill="none" stroke="#e8871e" stroke-width="3"/>
  <path d="M 590 190 L 790 190 L 790 530 L 670 530" fill="none" stroke="#b8860b" stroke-width="3"/>
  <path d="M 790 530 L 790 670 L 670 670" fill="none" stroke="#b8860b" stroke-width="3"/>
  <text x="812" y="172" font-size="10" fill="#845b00">lightly twist</text>
  <text x="812" y="185" font-size="10" fill="#845b00">this pair</text>

  <!-- Termination resistors -->
  <rect x="748" y="238" width="54" height="22" fill="#fff" stroke="#666" rx="4"/>
  <text x="775" y="253" font-size="10" text-anchor="middle" fill="#333">120 Ω</text>
  <circle cx="760" cy="238" r="3.5" fill="#e8871e"/>
  <circle cx="790" cy="260" r="3.5" fill="#b8860b"/>
  <line x1="760" y1="640" x2="760" y2="688" stroke="#e8871e" stroke-width="3"/>
  <line x1="790" y1="670" x2="790" y2="688" stroke="#b8860b" stroke-width="3"/>
  <rect x="748" y="688" width="54" height="22" fill="#fff" stroke="#666" rx="4"/>
  <text x="775" y="703" font-size="10" text-anchor="middle" fill="#333">120 Ω</text>
  <circle cx="760" cy="640" r="3.5" fill="#e8871e"/>
  <circle cx="790" cy="670" r="3.5" fill="#b8860b"/>
  <text x="812" y="252" font-size="10" fill="#666">one at each END of the bus —</text>
  <text x="812" y="265" font-size="10" fill="#666">powered-off bus measures ~60 Ω</text>

  <!-- Notes box -->
  <rect x="60" y="300" width="200" height="130" fill="#fffbe8" stroke="#c9a227" rx="6"/>
  <text x="70" y="320" font-size="11" font-weight="bold" fill="#6b5200">Golden rules</text>
  <g font-size="10" fill="#514000">
    <text x="70" y="338">· multimeter checks polarity first</text>
    <text x="70" y="353">· wire only with power off</text>
    <text x="70" y="368">· clamp motors before first move</text>
    <text x="70" y="383">· Serial Monitor: 115200 + "New Line"</text>
    <text x="70" y="398">· GPIO6/7 chosen to avoid C6</text>
    <text x="70" y="411">  strapping pins (GPIO4/5)</text>
  </g>
</svg>
