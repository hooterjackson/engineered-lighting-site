<svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="640" fill="#ffffff"/>
  <text x="30" y="36" font-size="20" font-weight="bold" fill="#111">Doc 4 · Full bench, one picture</text>
  <text x="30" y="56" font-size="12" fill="#555">One ESP32-C6, three subsystems, three kinds of "dimmer." Detailed wiring lives in the stage diagrams; this is the map.</text>

  <!-- HA -->
  <rect x="380" y="80" width="240" height="54" fill="#eef3fb" stroke="#334" rx="10"/>
  <text x="500" y="103" font-size="13" font-weight="bold" text-anchor="middle" fill="#223">Home Assistant</text>
  <text x="500" y="120" font-size="10" text-anchor="middle" fill="#556">WiFi · light entities, mode select, dashboards</text>

  <!-- ESP32 -->
  <rect x="380" y="180" width="240" height="90" fill="#fff" stroke="#111" stroke-width="2" rx="10"/>
  <text x="500" y="212" font-size="15" font-weight="bold" text-anchor="middle" fill="#111">ESP32-C6</text>
  <text x="500" y="230" font-size="10" text-anchor="middle" fill="#555">ESPHome (ESP-IDF) · api + mqtt(discovery:false)</text>
  <text x="500" y="246" font-size="10" text-anchor="middle" fill="#555">I2C · 3× LEDC · TWAI(CAN)</text>
  <line x1="500" y1="134" x2="500" y2="180" stroke="#334" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- LEFT: tape chain -->
  <rect x="40" y="320" width="250" height="64" fill="#fdf6ec" stroke="#a8792a" rx="8"/>
  <text x="165" y="345" font-size="12" font-weight="bold" text-anchor="middle" fill="#6b4c12">2× PCA9685 PWM expanders</text>
  <text x="165" y="362" font-size="10" text-anchor="middle" fill="#8a6a2f">0x40: zones 1–5 · 0x41: zones 6–7 · 1220 Hz</text>
  <path d="M 380 225 L 165 225 L 165 320" fill="none" stroke="#1d6fd6" stroke-width="3"/>
  <text x="200" y="218" font-size="10" fill="#1d6fd6">I2C (2 wires, GPIO2/3)</text>

  <rect x="40" y="420" width="250" height="58" fill="#eefaf1" stroke="#2a8a4a" rx="8"/>
  <text x="165" y="443" font-size="12" font-weight="bold" text-anchor="middle" fill="#1c5c33">4× ULN2803A switches</text>
  <text x="165" y="460" font-size="10" text-anchor="middle" fill="#3f7c55">21 low-side channels (two zones per chip)</text>
  <line x1="165" y1="384" x2="165" y2="420" stroke="#666" stroke-width="3"/>

  <rect x="40" y="512" width="250" height="58" fill="#fff8ec" stroke="#a8792a" rx="8"/>
  <text x="165" y="535" font-size="12" font-weight="bold" text-anchor="middle" fill="#6b4c12">Valent X tape · 7 zones × 3 whites</text>
  <text x="165" y="552" font-size="10" text-anchor="middle" fill="#8a6a2f">constant-voltage 24 V · common anode</text>
  <line x1="165" y1="478" x2="165" y2="512" stroke="#666" stroke-width="3"/>

  <!-- MIDDLE: spotlight chain -->
  <rect x="380" y="380" width="240" height="60" fill="#eef6ff" stroke="#2a6aa8" rx="8"/>
  <text x="500" y="404" font-size="12" font-weight="bold" text-anchor="middle" fill="#174a7c">PicoBuck · 3 CC channels</text>
  <text x="500" y="421" font-size="10" text-anchor="middle" fill="#3c69a0">330/660 mA constant-current</text>
  <path d="M 500 270 L 500 380" fill="none" stroke="#e07000" stroke-width="3"/>
  <text x="490" y="322" font-size="10" fill="#e07000" text-anchor="end">3× LEDC PWM dim</text>
  <text x="490" y="336" font-size="10" fill="#e07000" text-anchor="end">(GPIO10/11/18 @ 500 Hz)</text>

  <rect x="380" y="480" width="240" height="66" fill="#fff8ec" stroke="#a8792a" rx="8"/>
  <text x="500" y="504" font-size="12" font-weight="bold" text-anchor="middle" fill="#6b4c12">Cree 3-up star + Carclo 10507</text>
  <text x="500" y="521" font-size="10" text-anchor="middle" fill="#8a6a2f">warm/neutral/cool dies · ~16° beam · on heatsink</text>
  <text x="500" y="537" font-size="10" text-anchor="middle" fill="#8a6a2f">rides the gimbal head</text>
  <line x1="500" y1="440" x2="500" y2="480" stroke="#666" stroke-width="3"/>

  <!-- RIGHT: gimbal chain -->
  <rect x="710" y="320" width="250" height="64" fill="#eefaf1" stroke="#2a8a4a" rx="8"/>
  <text x="835" y="345" font-size="12" font-weight="bold" text-anchor="middle" fill="#1c5c33">SN65HVD230 transceiver</text>
  <text x="835" y="362" font-size="10" text-anchor="middle" fill="#3f7c55">GPIO6/7 → CAN @ 1 Mbit/s · 120 Ω × 2</text>
  <path d="M 620 225 L 835 225 L 835 320" fill="none" stroke="#0f8a3d" stroke-width="3"/>
  <text x="700" y="218" font-size="10" fill="#0f8a3d">TWAI (CAN controller on-chip)</text>

  <rect x="710" y="420" width="250" height="70" fill="#f4f0fb" stroke="#6b4ca8" rx="8"/>
  <text x="835" y="445" font-size="12" font-weight="bold" text-anchor="middle" fill="#4a3579">2× RMD-L-5005 smart servos</text>
  <text x="835" y="462" font-size="10" text-anchor="middle" fill="#6b57a0">pan 0x141 · tilt 0x142 · 0xA4 "go to angle"</text>
  <text x="835" y="478" font-size="10" text-anchor="middle" fill="#6b57a0">absolute encoders → no homing dance</text>
  <line x1="835" y1="384" x2="835" y2="420" stroke="#666" stroke-width="3"/>

  <rect x="710" y="520" width="250" height="50" fill="#f4f0fb" stroke="#6b4ca8" rx="8" stroke-dasharray="6 3"/>
  <text x="835" y="541" font-size="11" font-weight="bold" text-anchor="middle" fill="#4a3579">Printed yoke + balanced head</text>
  <text x="835" y="557" font-size="10" text-anchor="middle" fill="#6b57a0">Doc 3 stage 7 — carries the star above</text>
  <line x1="835" y1="490" x2="835" y2="520" stroke="#666" stroke-width="2" stroke-dasharray="5 4"/>

  <!-- Power strip note -->
  <rect x="40" y="90" width="280" height="120" fill="#fffbe8" stroke="#c9a227" rx="8"/>
  <text x="52" y="112" font-size="11" font-weight="bold" fill="#6b5200">Power (stage-1 backbone)</text>
  <g font-size="10" fill="#514000">
    <text x="52" y="130">24 V fused bus → tape anodes, PicoBuck,</text>
    <text x="52" y="145">motors, buck (→5 V → ESP32)</text>
    <text x="52" y="160">One star ground for everything</text>
    <text x="52" y="175">Breadboard: signals only</text>
    <text x="52" y="190">Three dimmers: CV switch · CC driver · smart servo</text>
  </g>

  <!-- Later software note -->
  <rect x="680" y="90" width="290" height="120" fill="#f2f2f7" stroke="#889" rx="8"/>
  <text x="692" y="112" font-size="11" font-weight="bold" fill="#445">Where this goes next (Docs 5–7)</text>
  <g font-size="10" fill="#556">
    <text x="692" y="130">GPU box tracker → aim targets:</text>
    <text x="692" y="145">bench = MQTT spotlight/target</text>
    <text x="692" y="160">production = native-API fixture_aim()</text>
    <text x="692" y="175">Brightness always via the HA light entity</text>
    <text x="692" y="190">Auto/Hold/Manual select gates autonomy</text>
  </g>
</svg>
