<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="620" fill="#ffffff"/>
  <text x="30" y="36" font-size="20" font-weight="bold" fill="#111">Doc 4 · Zone 1 first light (stage 2)</text>
  <text x="30" y="56" font-size="12" fill="#555">The control chain for one tape zone. Scale-up (stage 4) repeats this pattern per the channel table — same shapes, more of them.</text>

  <!-- ESP32 -->
  <rect x="40" y="100" width="180" height="190" fill="#eef3fb" stroke="#334" stroke-width="1.5" rx="8"/>
  <text x="130" y="124" font-size="13" font-weight="bold" text-anchor="middle" fill="#223">ESP32-C6</text>
  <g font-size="11" fill="#223" text-anchor="end">
    <text x="212" y="154">3V3</text>
    <text x="212" y="184">GND</text>
    <text x="212" y="214">GPIO2</text>
    <text x="212" y="244">GPIO3</text>
  </g>

  <!-- PCA9685 -->
  <rect x="340" y="100" width="210" height="230" fill="#fdf6ec" stroke="#334" stroke-width="1.5" rx="8"/>
  <text x="445" y="124" font-size="13" font-weight="bold" text-anchor="middle" fill="#223">PCA9685 #1 · addr 0x40</text>
  <g font-size="11" fill="#223">
    <text x="348" y="154">VCC</text>
    <text x="348" y="184">GND</text>
    <text x="348" y="214">SDA</text>
    <text x="348" y="244">SCL</text>
    <text x="506" y="154">LED0</text>
    <text x="506" y="184">LED1</text>
    <text x="506" y="214">LED2</text>
  </g>
  <text x="445" y="300" font-size="10" text-anchor="middle" fill="#8a6a2f">V+ pin: leave unconnected · A0 jumper open here</text>
  <text x="445" y="315" font-size="10" text-anchor="middle" fill="#8a6a2f">(board #2 bridges A0 → 0x41 in stage 4)</text>

  <!-- I2C + power wires -->
  <line x1="220" y1="150" x2="340" y2="150" stroke="#7b2d8b" stroke-width="3"/>
  <line x1="220" y1="180" x2="340" y2="180" stroke="#222" stroke-width="3"/>
  <line x1="220" y1="210" x2="340" y2="210" stroke="#1d6fd6" stroke-width="3"/><text x="280" y="204" font-size="10" fill="#1d6fd6" text-anchor="middle">SDA</text>
  <line x1="220" y1="240" x2="340" y2="240" stroke="#0e8a7a" stroke-width="3"/><text x="280" y="256" font-size="10" fill="#0e8a7a" text-anchor="middle">SCL</text>

  <!-- The 3.3V trap callout -->
  <rect x="236" y="78" width="330" height="0" fill="none"/>
  <rect x="580" y="70" width="390" height="58" fill="#fdecec" stroke="#c33" rx="6"/>
  <text x="592" y="90" font-size="11" font-weight="bold" fill="#8a1c1c">The classic trap, pre-solved:</text>
  <text x="592" y="106" font-size="10" fill="#7c2a2a">PCA9685 VCC gets 3.3 V — NOT 5 V. At 5 V its logic threshold rises</text>
  <text x="592" y="120" font-size="10" fill="#7c2a2a">above what the ESP32 outputs and I2C silently fails.</text>

  <!-- ULN2803A -->
  <rect x="660" y="150" width="230" height="230" fill="#eefaf1" stroke="#334" stroke-width="1.5" rx="8"/>
  <text x="775" y="174" font-size="13" font-weight="bold" text-anchor="middle" fill="#223">ULN2803A · chip 1</text>
  <g font-size="11" fill="#223">
    <text x="668" y="204">IN1 (p1)</text>
    <text x="668" y="234">IN2 (p2)</text>
    <text x="668" y="264">IN3 (p3)</text>
    <text x="882" y="334" text-anchor="end">GND (p9)</text>
    <text x="882" y="204" text-anchor="end">OUT1 (p18)</text>
    <text x="882" y="234" text-anchor="end">OUT2 (p17)</text>
    <text x="882" y="264" text-anchor="end">OUT3 (p16)</text>
  </g>
  <text x="775" y="356" font-size="10" text-anchor="middle" fill="#3f7c55">OUTn = pin 19−n (directly across)</text>
  <text x="775" y="371" font-size="10" text-anchor="middle" fill="#3f7c55">pin 10 COM: leave unconnected</text>

  <!-- PCA -> ULN wires -->
  <line x1="550" y1="150" x2="620" y2="150" stroke="#c47a00" stroke-width="3"/><path d="M 620 150 L 620 200 L 660 200" fill="none" stroke="#c47a00" stroke-width="3"/>
  <line x1="550" y1="180" x2="605" y2="180" stroke="#7a7a7a" stroke-width="3"/><path d="M 605 180 L 605 230 L 660 230" fill="none" stroke="#7a7a7a" stroke-width="3"/>
  <line x1="550" y1="210" x2="590" y2="210" stroke="#2e86c1" stroke-width="3"/><path d="M 590 210 L 590 260 L 660 260" fill="none" stroke="#2e86c1" stroke-width="3"/>

  <!-- Tape zone -->
  <rect x="340" y="440" width="560" height="120" fill="#fff8ec" stroke="#a8792a" stroke-width="1.5" rx="8"/>
  <text x="620" y="466" font-size="13" font-weight="bold" text-anchor="middle" fill="#6b4c12">Valent X tape · Zone 1 (2 segments, 4 soldered wires)</text>
  <g font-size="11" fill="#6b4c12" text-anchor="middle">
    <text x="430" y="500">+24 V</text><text x="430" y="516">(common anode)</text>
    <text x="590" y="500">1800 K −</text>
    <text x="710" y="500">3500 K −</text>
    <text x="830" y="500">6500 K −</text>
  </g>
  <text x="620" y="545" font-size="10" text-anchor="middle" fill="#8a6a2f">label wires from the tape's printed pad markings — fix mislabeled colors at the wires, never in software</text>

  <!-- ULN OUTs -> tape channels -->
  <path d="M 890 200 L 930 200 L 930 410 L 590 410 L 590 440" fill="none" stroke="#c47a00" stroke-width="3"/>
  <path d="M 890 230 L 915 230 L 915 425 L 710 425 L 710 440" fill="none" stroke="#7a7a7a" stroke-width="3"/>
  <path d="M 890 260 L 900 260 L 900 395 L 830 395 L 830 440" fill="none" stroke="#2e86c1" stroke-width="3"/>

  <!-- 24V bus + GND star -->
  <rect x="40" y="430" width="130" height="52" fill="#ffe9e6" stroke="#d62828" stroke-width="2" rx="6"/>
  <text x="105" y="452" font-size="11" font-weight="bold" text-anchor="middle" fill="#8a1c1c">+24 V BUS</text>
  <text x="105" y="468" font-size="9" text-anchor="middle" fill="#b45">(stage-1 WAGO)</text>
  <path d="M 170 456 L 430 456 L 430 440" fill="none" stroke="#d62828" stroke-width="3.5"/>

  <rect x="40" y="510" width="130" height="52" fill="#ececec" stroke="#222" stroke-width="2" rx="6"/>
  <text x="105" y="532" font-size="11" font-weight="bold" text-anchor="middle" fill="#111">GND STAR</text>
  <text x="105" y="548" font-size="9" text-anchor="middle" fill="#444">(stage-1 WAGO)</text>
  <path d="M 250 180 L 250 536" fill="none" stroke="#222" stroke-width="2.5" stroke-dasharray="5 4"/>
  <path d="M 170 536 L 250 536 L 250 600 L 945 600 L 945 330 L 890 330" fill="none" stroke="#222" stroke-width="3"/>
  <circle cx="250" cy="536" r="3.5" fill="#222"/>
  <text x="480" y="592" font-size="10" fill="#333" text-anchor="middle">one star ground — ULN p9 + ESP32/PCA GND all return here</text>
</svg>
